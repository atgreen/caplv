name: Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Lint — PR and push only.
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check linter configuration
        run: make lint-config

      - name: Run linter
        run: make lint

  # ─────────────────────────────────────────────────────────────────────────────
  # Extract version — all events; downstream jobs depend on this.
  # ─────────────────────────────────────────────────────────────────────────────
  extract-version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag-name }}
      image-tag: ${{ steps.version.outputs.image-tag }}
      image-repository: ${{ steps.version.outputs.image-repository }}
      short-sha: ${{ steps.version.outputs.short-sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        uses: ./.github/actions/extract-version
        with:
          repository: ${{ github.repository }}
          workflow-type: ${{ github.event_name == 'pull_request' && 'pr' || startsWith(github.ref, 'refs/tags/v') && 'release' || 'main' }}
          pr-number: ${{ github.event.pull_request.number }}
          release-tag: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Build and test — all events.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: [extract-version]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          go mod tidy
          make build

      - name: Run unit tests
        run: make test

  # ─────────────────────────────────────────────────────────────────────────────
  # E2E tests — all events.
  # ─────────────────────────────────────────────────────────────────────────────
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Run E2E tests
        run: |
          go mod tidy
          make test-e2e
        env:
          CONTAINER_TOOL: docker

  # ─────────────────────────────────────────────────────────────────────────────
  # Docker build and push — all events.
  # PR images are tagged with pr-NUMBER, main with date + latest, releases
  # with semver tags. Cosign signing on main and release only.
  # ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [build, extract-version, test-e2e]
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.docker_build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (PR)
        id: meta-pr
        if: github.event_name == 'pull_request'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.extract-version.outputs.image-tag }}
            type=raw,value=sha-${{ needs.extract-version.outputs.short-sha }}
          flavor: |
            latest=false

      - name: Extract metadata (push to main)
        id: meta-main
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v')
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.extract-version.outputs.image-tag }}
            type=raw,value=sha-${{ needs.extract-version.outputs.short-sha }}
            type=raw,value=latest
          flavor: |
            latest=false

      - name: Extract metadata (release)
        id: meta-release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=raw,value=sha-${{ needs.extract-version.outputs.short-sha }}
            type=raw,value=latest
          flavor: |
            latest=false

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta-pr.outputs.tags }}
            ${{ steps.meta-main.outputs.tags }}
            ${{ steps.meta-release.outputs.tags }}
          labels: |
            ${{ steps.meta-pr.outputs.labels }}
            ${{ steps.meta-main.outputs.labels }}
            ${{ steps.meta-release.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

      # Sign with Cosign (keyless, Sigstore) — main and release only.
      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign container image with Cosign
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.docker_build.outputs.digest }}

      # Release only: generate a CycloneDX SBOM for the published image.
      - name: Generate Docker SBOM
        if: startsWith(github.ref, 'refs/tags/v')
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.extract-version.outputs.image-tag }}
          format: cyclonedx-json
          output-file: docker-sbom.json
          upload-release-assets: false

      - name: Upload Docker SBOM as artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: docker-sbom
          path: docker-sbom.json

  # ─────────────────────────────────────────────────────────────────────────────
  # GitHub Artifact Attestation — all events.
  # ─────────────────────────────────────────────────────────────────────────────
  attest:
    name: Attest Docker Image
    runs-on: ubuntu-latest
    needs: [docker, extract-version]
    permissions:
      id-token: write
      attestations: write
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ needs.docker.outputs.digest }}
          push-to-registry: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Container security scan — all events.
  # ─────────────────────────────────────────────────────────────────────────────
  trivy:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: [docker, extract-version]
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.extract-version.outputs.image-tag }}
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ github.event_name }}

      - name: Upload Trivy report as artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif

  # ─────────────────────────────────────────────────────────────────────────────
  # Go dependency audit — all events.
  # Stdlib vulns (fixable only by bumping Go) are reported but don't fail CI.
  # ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        continue-on-error: true
        run: govulncheck ./...

  # ─────────────────────────────────────────────────────────────────────────────
  # Release only: build the CAPI provider release manifests
  # (infrastructure-components.yaml + metadata.yaml) per the clusterctl
  # provider contract: https://cluster-api.sigs.k8s.io/clusterctl/provider-contract.html
  # ─────────────────────────────────────────────────────────────────────────────
  package-deploy-manifests:
    name: Build Provider Release Manifests
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [extract-version]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate manifests
        run: make manifests

      - name: Build infrastructure-components.yaml
        run: make build-installer IMG=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ needs.extract-version.outputs.version }}

      - name: Stage release manifests
        run: |
          mkdir -p release-manifests
          cp dist/infrastructure-components.yaml release-manifests/
          cp metadata.yaml release-manifests/
          cp templates/cluster-template.yaml release-manifests/

      - name: Upload release manifests
        uses: actions/upload-artifact@v4
        with:
          name: release-manifests
          path: release-manifests/

  # ─────────────────────────────────────────────────────────────────────────────
  # Release only: generate SLSA Level 3 provenance.
  # ─────────────────────────────────────────────────────────────────────────────
  generate-provenance-subjects:
    name: Generate SLSA Provenance Subjects
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [package-deploy-manifests, extract-version]
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Download release manifests
        uses: actions/download-artifact@v4
        with:
          name: release-manifests
          path: ./artifacts

      - name: Generate hashes for SLSA provenance
        id: hash
        run: |
          cd artifacts
          sha256sum infrastructure-components.yaml metadata.yaml cluster-template.yaml > checksums.txt
          cat checksums.txt
          echo "hashes=$(cat checksums.txt | base64 -w0)" >> "$GITHUB_OUTPUT"

  slsa-provenance:
    name: Generate SLSA Provenance
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [generate-provenance-subjects, extract-version]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.generate-provenance-subjects.outputs.hashes }}"
      # upload-assets must be false because the GitHub release does not yet
      # exist when this job runs — upload-release-assets creates a draft and
      # attaches the provenance artifact alongside the other files.
      upload-assets: false
      provenance-name: "${{ needs.extract-version.outputs.version }}.intoto.jsonl"

  # ─────────────────────────────────────────────────────────────────────────────
  # Release only: collate all artifacts and upload to the GitHub Release.
  # ─────────────────────────────────────────────────────────────────────────────
  upload-release-assets:
    name: Upload Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [docker, attest, slsa-provenance, package-deploy-manifests]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Organize release artifacts
        run: |
          cd artifacts
          mkdir -p release sboms provenance

          # Copy CAPI provider release manifests
          if [ -f "release-manifests/infrastructure-components.yaml" ]; then
            cp release-manifests/infrastructure-components.yaml release/
          fi
          if [ -f "release-manifests/metadata.yaml" ]; then
            cp release-manifests/metadata.yaml release/
          fi
          if [ -f "release-manifests/cluster-template.yaml" ]; then
            cp release-manifests/cluster-template.yaml release/
          fi

          # Copy Docker SBOM
          if [ -d "docker-sbom" ] && [ -f "docker-sbom/docker-sbom.json" ]; then
            cp docker-sbom/docker-sbom.json sboms/
          fi

          # Copy Trivy report
          if [ -d "trivy-report" ] && [ -f "trivy-report/trivy-results.sarif" ]; then
            cp trivy-report/trivy-results.sarif sboms/
          fi

          # Copy SLSA provenance
          find . -name "*.intoto.jsonl" -type f -exec cp {} provenance/ \;

          # Generate SHA256 checksums
          cd release
          sha256sum * > checksums.sha256 2>/dev/null || true
          cd ../sboms
          sha256sum * >> ../release/checksums.sha256 2>/dev/null || true
          cd ../provenance
          if compgen -G "*.intoto.jsonl" > /dev/null 2>&1; then
            sha256sum *.intoto.jsonl >> ../release/checksums.sha256
          fi

          echo "Release artifacts:"
          ls -lhR ../

      # Create a DRAFT release the maintainer reviews and then publishes
      # manually. The action creates the release if it does not yet exist for
      # the tag, attaches the files, and leaves it unpublished. This matches
      # the CAPI ecosystem convention (see cluster-api-provider-vsphere) and
      # prevents a half-built release from going public if any earlier job
      # in the workflow fails.
      - name: Upload release assets (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          files: |
            artifacts/release/infrastructure-components.yaml
            artifacts/release/metadata.yaml
            artifacts/release/cluster-template.yaml
            artifacts/sboms/*
            artifacts/provenance/*.intoto.jsonl
            artifacts/release/checksums.sha256
