---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: libvirthosts.infrastructure.cluster.x-k8s.io
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    kind: LibvirtHost
    listKind: LibvirtHostList
    plural: libvirthosts
    singular: libvirthost
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.uri
      name: URI
      type: string
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .status.capacity.availableVCPUs
      name: vCPUs
      priority: 1
      type: integer
    - jsonPath: .status.capacity.availableMemoryMB
      name: MemMB
      priority: 1
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          LibvirtHost is the Schema for the libvirthosts API.
          It represents a reusable libvirt host connection configuration.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of LibvirtHost.
            properties:
              firmwarePath:
                default: /usr/share/OVMF/OVMF_CODE.secboot.fd
                description: firmwarePath overrides the OVMF firmware path on the
                  host.
                type: string
              healthCheckIntervalSeconds:
                default: 300
                description: |-
                  healthCheckIntervalSeconds is how often (in seconds) to recheck this
                  host when it has active machines. Hosts with no machines are not polled.
                  Default: 300 (5 minutes).
                format: int32
                minimum: 30
                type: integer
              hostKeyFingerprint:
                description: |-
                  hostKeyFingerprint is the SSH host key fingerprint (SHA256:...) used to
                  verify the identity of the remote host.
                type: string
              nvramTemplatePath:
                default: /usr/share/OVMF/OVMF_VARS.fd
                description: nvramTemplatePath overrides the NVRAM template path on
                  the host.
                type: string
              reservedResources:
                description: |-
                  reservedResources specifies how much CPU and memory to reserve for the
                  host's incumbent workloads. CAPLV will not allocate VMs that exceed
                  the remaining capacity. If unset, defaults to reserving 2 vCPUs and
                  4096 MB of memory.
                properties:
                  memoryMB:
                    default: 4096
                    description: 'memoryMB is the amount of memory in MB to reserve
                      for the host. Default: 4096.'
                    format: int32
                    minimum: 0
                    type: integer
                  vcpus:
                    default: 2
                    description: 'vcpus is the number of vCPUs to reserve for the
                      host. Default: 2.'
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              secretRef:
                description: |-
                  secretRef is a reference to a Secret containing the SSH private key
                  for authenticating to the libvirt host.
                properties:
                  name:
                    description: name is the name of the Secret.
                    minLength: 1
                    type: string
                  namespace:
                    description: |-
                      namespace is the namespace of the Secret.
                      If not specified, the namespace of the referencing resource is used.
                    type: string
                required:
                - name
                type: object
              uri:
                description: |-
                  uri is the libvirt connection URI (e.g. qemu+ssh://user@host/system).
                  The path selects the libvirt daemon on the host: /system (default)
                  connects to the privileged system daemon; /session connects to the
                  per-user daemon of the SSH user. Session mode requires host setup for
                  unprivileged networking (qemu-bridge-helper) and only supports
                  network.type=bridge on machines.
                minLength: 1
                type: string
            required:
            - secretRef
            - uri
            type: object
          status:
            description: status defines the observed state of LibvirtHost.
            properties:
              capacity:
                description: |-
                  capacity reports the discovered host resources and what is available
                  for CAPLV after reservations.
                properties:
                  availableMemoryMB:
                    description: availableMemoryMB is the memory available for CAPLV
                      after reservations in MB.
                    format: int32
                    type: integer
                  availableVCPUs:
                    description: availableVCPUs is the vCPUs available for CAPLV after
                      reservations.
                    format: int32
                    type: integer
                  totalMemoryMB:
                    description: totalMemoryMB is the total physical memory on the
                      host in MB.
                    format: int32
                    type: integer
                  totalVCPUs:
                    description: totalVCPUs is the total number of CPU threads on
                      the host.
                    format: int32
                    type: integer
                type: object
              conditions:
                description: conditions represent the current state of the LibvirtHost
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastChecked:
                description: lastChecked is the timestamp of the last connectivity
                  check.
                format: date-time
                type: string
              ready:
                description: ready indicates whether the host is reachable and usable.
                type: boolean
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
