                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              domainState:
                description: domainState is the current state of the libvirt domain
                  (e.g. running, shutoff).
                type: string
              domainUUID:
                description: domainUUID is the UUID of the libvirt domain.
                type: string
              failureMessage:
                description: failureMessage is a human-readable description of the
                  failure.
                type: string
              failureReason:
                description: failureReason is a machine-readable string indicating
                  the reason for a failure.
                type: string
              managedArtifacts:
                description: managedArtifacts tracks the libvirt artifacts managed
                  by the controller.
                properties:
                  additionalDiskVolumes:
                    description: additionalDiskVolumes is a list of additional disk
                      volume names.
                    items:
                      type: string
                    type: array
                  bootstrapISO:
                    description: bootstrapISO is the name of the bootstrap ISO volume
                      in the storage pool.
                    type: string
                  domainName:
                    description: domainName is the name of the libvirt domain.
                    type: string
                  ephemeralPoolName:
                    description: |-
                      ephemeralPoolName is the name of the tmpfs pool created by CAPLV.
                      Only set when spec.rootDisk.ephemeralPool is true.
                    type: string
                  nvramPath:
                    description: nvramPath is the path to the NVRAM file on the host.
                    type: string
                  rootDiskVolume:
                    description: rootDiskVolume is the name of the root disk volume
                      in the storage pool.
                    type: string
                type: object
              ready:
                description: ready indicates whether the machine infrastructure is
                  ready.
                type: boolean
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
