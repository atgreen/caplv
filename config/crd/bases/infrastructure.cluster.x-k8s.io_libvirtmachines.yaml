          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of LibvirtMachine.
            properties:
              additionalDisks:
                description: additionalDisks is an optional list of additional data
                  disks to attach.
                items:
                  description: AdditionalDiskSpec defines an additional data disk.
                  properties:
                    bus:
                      default: virtio
                      description: bus is the disk bus type.
                      type: string
                    name:
                      description: name is a unique identifier for this disk within
                        the machine.
                      type: string
                    size:
                      anyOf:
                      - type: integer
                      - type: string
                      description: size is the desired size of the disk.
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
