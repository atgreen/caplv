                - cloud-init
                type: string
              domain:
                description: domain defines the virtual machine domain configuration.
                properties:
                  firmware:
                    default: uefi
                    description: firmware is the firmware type for the virtual machine.
                    enum:
                    - uefi
                    - bios
                    type: string
                  machine:
                    default: q35
                    description: machine is the QEMU machine type.
                    type: string
                  memoryMB:
                    description: |-
                      memoryMB is the amount of memory in megabytes to allocate.
                      If zero or omitted, auto-sized from the LibvirtHost's available
                      capacity (total memory minus reserved).
                    format: int32
                    minimum: 0
                    type: integer
                  vcpus:
                    description: |-
                      vcpus is the number of virtual CPUs to allocate.
                      If zero or omitted, auto-sized from the LibvirtHost's available
                      capacity (total vCPUs minus reserved).
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              hostRef:
                description: hostRef is a reference to a LibvirtHost resource in the
                  same namespace.
                properties:
                  name:
                    default: ""
                    description: |-
                      Name of the referent.
                      This field is effectively required, but due to backwards compatibility is
                      allowed to be empty. Instances of this type with an empty value here are
                      almost certainly wrong.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              network:
                description: network defines the network configuration for the virtual
                  machine.
                properties:
                  addresses:
                    description: addresses is a list of static IP addresses in CIDR
                      notation (e.g. 192.168.1.10/24).
                    items:
                      type: string
                    minItems: 1
                    type: array
                  dns:
                    description: dns defines DNS configuration for the network.
                    properties:
                      nameservers:
                        description: nameservers is a list of DNS server addresses.
                        items:
                          type: string
                        type: array
                      searchDomains:
                        description: searchDomains is a list of DNS search domains.
                        items:
                          type: string
                        type: array
                    type: object
                  gateway:
                    description: gateway is the default gateway address.
                    type: string
                  macAddress:
                    description: macAddress is an optional MAC address to assign to
                      the interface.
                    type: string
                  model:
                    default: virtio
                    description: model is the NIC model.
                    type: string
                  name:
                    description: name is the name of the libvirt network or bridge
                      device.
                    minLength: 1
                    type: string
                  type:
                    description: type is the type of libvirt network attachment.
                    enum:
                    - bridge
                    - network
                    type: string
                required:
                - addresses
                - name
                - type
                type: object
              providerID:
                description: |-
                  providerID is the identifier used by CAPI to reference this machine.
                  Set by the controller after the domain is created.
                type: string
              rootDisk:
                description: rootDisk defines the root disk configuration.
                properties:
                  baseImage:
                    description: baseImage is the name of the base image volume to
                      clone from.
                    minLength: 1
                    type: string
                  baseImagePool:
                    description: |-
                      baseImagePool is the storage pool containing the base image.
                      If unset, defaults to storagePool. This allows the base image to
                      live on persistent storage while ephemeral VM disks use a different
                      pool (e.g., tmpfs-backed for ephemeral workers).
                    type: string
                  bus:
                    default: virtio
                    description: bus is the disk bus type.
                    type: string
                  cloneStrategy:
                    default: copy-on-write
                    description: cloneStrategy defines how the root disk is cloned
                      from the base image.
                    enum:
                    - copy-on-write
                    - full-clone
                    type: string
                  ephemeralPool:
                    description: |-
                      ephemeralPool, when true, causes CAPLV to create the storagePool as
                      a tmpfs-backed pool at provisioning time and destroy it (including
                      the tmpfs mount) at deletion time. This ensures the host's persistent
                      storage is never touched and RAM is only consumed while the VM exists.
                      Requires storagePool to differ from baseImagePool.
                    type: boolean
                  size:
                    anyOf:
                    - type: integer
                    - type: string
                    description: size is the desired size of the root disk.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  storagePool:
                    description: storagePool is the name of the libvirt storage pool
                      to use.
                    minLength: 1
                    type: string
                required:
                - baseImage
                - size
                - storagePool
                type: object
            required:
            - bootstrapFormat
            - domain
            - hostRef
            - network
            - rootDisk
            type: object
          status:
