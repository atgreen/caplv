                    storagePool:
                      description: storagePool is the name of the libvirt storage
                        pool to use.
                      type: string
                  required:
                  - name
                  - size
                  - storagePool
                  type: object
                type: array
              bootstrapFormat:
                default: ignition
                description: bootstrapFormat specifies the format of bootstrap data
                  to generate.
                enum:
