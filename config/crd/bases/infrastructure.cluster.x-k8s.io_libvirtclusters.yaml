---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: libvirtclusters.infrastructure.cluster.x-k8s.io
spec:
  group: infrastructure.cluster.x-k8s.io
  names:
    kind: LibvirtCluster
    listKind: LibvirtClusterList
    plural: libvirtclusters
    singular: libvirtcluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    - jsonPath: .spec.controlPlaneEndpoint.host
      name: Endpoint
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          LibvirtCluster is the Schema for the libvirtclusters API.
          It fulfills the Cluster API infrastructure cluster contract.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of LibvirtCluster.
            properties:
              bootArtifacts:
                description: |-
                  bootArtifacts, when set, switches first-boot ignition delivery from
                  QEMU fw_cfg to libvirt direct-kernel-boot plus a virtio-blk ignition
                  disk. The kernel's qemu_fw_cfg driver does O(n²) offset reads, which
                  burns seconds of wall-clock time for multi-MB ignition payloads.
                properties:
                  hostPath:
                    description: |-
                      HostPath is the directory on each libvirt host where kernel/initramfs are cached.
                      Files land at <HostPath>/<sha256>/vmlinuz and <HostPath>/<sha256>/initramfs.img.
                    type: string
                  kernelArgs:
                    description: |-
                      KernelArgs is the cmdline appended to the direct-boot kernel. The user is
                      responsible for setting an ignition.config.url that reads from the virtio-blk
                      ignition disk (serial=ignition), e.g.
                        "ignition.platform.id=metal ignition.config.url=oem:/dev/disk/by-id/virtio-ignition console=ttyS0"
                    minLength: 1
                    type: string
                  source:
                    description: Source describes where to fetch the kernel and initramfs
                      from.
                    properties:
                      https:
                        description: HTTPSBootArtifactsSource fetches kernel+initramfs
                          over HTTPS.
                        properties:
                          initramfsSHA256:
                            type: string
                          initramfsURL:
                            type: string
                          kernelSHA256:
                            type: string
                          kernelURL:
                            type: string
                        required:
                        - initramfsURL
                        - kernelURL
                        type: object
                      oci:
                        description: |-
                          OCIBootArtifactsSource fetches kernel+initramfs from a single OCI artifact.
                          The artifact is expected to be an `oras push`-style manifest whose layers
                          each carry an `org.opencontainers.image.title` annotation matching the file
                          name. KernelLayerTitle and InitramfsLayerTitle select the two layers; the
                          resolver fetches only those two blobs.
                        properties:
                          credentialsSecretRef:
                            description: |-
                              CredentialsSecretRef references a Secret in the LibvirtCluster's
                              namespace (or .namespace when set) containing registry credentials.
                              The Secret is read in two formats, in order of preference:
                                1. `.dockerconfigjson` (a kubernetes.io/dockerconfigjson Secret).
                                2. plain `username` / `password` keys.
                            properties:
                              name:
                                description: Name of the Secret.
                                minLength: 1
                                type: string
                              namespace:
                                description: Namespace of the Secret. Defaults to
                                  the LibvirtCluster's namespace.
                                type: string
                            required:
                            - name
                            type: object
                          initramfsLayerTitle:
                            description: |-
                              InitramfsLayerTitle is the org.opencontainers.image.title annotation
                              that identifies the initramfs layer. Defaults to "initramfs.img".
                            type: string
                          initramfsSHA256:
                            type: string
                          insecureSkipTLSVerify:
                            description: |-
                              InsecureSkipTLSVerify disables TLS certificate verification on the
                              registry endpoint. Intended only for self-signed dev registries.
                            type: boolean
                          kernelLayerTitle:
                            description: |-
                              KernelLayerTitle is the org.opencontainers.image.title annotation that
                              identifies the kernel layer in the manifest. Defaults to "vmlinuz".
                            type: string
                          kernelSHA256:
                            type: string
                          plainHTTP:
                            description: |-
                              PlainHTTP allows non-TLS pulls from the registry. Intended only for
                              in-cluster mirrors and development. Defaults to false.
                            type: boolean
                          reference:
                            description: Reference is the full OCI reference, e.g.
                              "ghcr.io/example/boot:v1".
                            type: string
                        required:
                        - reference
                        type: object
                      s3:
                        description: S3BootArtifactsSource fetches kernel+initramfs
                          from an S3-compatible store.
                        properties:
                          bucket:
                            type: string
                          credentialsSecretRef:
                            description: |-
                              CredentialsSecretRef references a Secret in the LibvirtCluster's
                              namespace (or .namespace when set) containing static credentials.
                              Recognized keys: `accessKeyID`, `secretAccessKey`, optional
                              `sessionToken`. If unset, the resolver attempts anonymous reads.
                            properties:
                              name:
                                description: Name of the Secret.
                                minLength: 1
                                type: string
                              namespace:
                                description: Namespace of the Secret. Defaults to
                                  the LibvirtCluster's namespace.
                                type: string
                            required:
                            - name
                            type: object
                          endpoint:
                            description: |-
                              Endpoint is the S3 endpoint host[:port], e.g. "s3.amazonaws.com" or
                              "minio.svc.cluster.local:9000".
                            type: string
                          initramfsKey:
                            type: string
                          initramfsSHA256:
                            type: string
                          insecure:
                            description: Insecure switches the endpoint to plain HTTP.
                              Defaults to false.
                            type: boolean
                          insecureSkipTLSVerify:
                            description: InsecureSkipTLSVerify disables TLS certificate
                              verification.
                            type: boolean
                          kernelKey:
                            type: string
                          kernelSHA256:
                            type: string
                          region:
                            description: |-
                              Region is the bucket's region. Optional for MinIO/Ceph; required by
                              AWS S3 (defaults to "us-east-1" if empty).
                            type: string
                          usePathStyle:
                            description: |-
                              UsePathStyle forces path-style addressing (bucket as URL path) rather
                              than virtual-hosted style. Required by MinIO and some Ceph setups.
                            type: boolean
                        required:
                        - bucket
                        - endpoint
                        - initramfsKey
                        - kernelKey
                        type: object
                      type:
                        description: BootArtifactsSourceType enumerates supported
                          artifact transports.
                        enum:
                        - HTTPS
                        - OCI
                        - S3
                        type: string
                    required:
                    - type
                    type: object
                required:
                - hostPath
                - kernelArgs
                - source
                type: object
              controlPlaneEndpoint:
                description: controlPlaneEndpoint represents the endpoint used to
                  communicate with the control plane.
                properties:
                  host:
                    description: The hostname on which the API server is serving.
                    type: string
                  port:
                    description: The port on which the API server is serving.
                    format: int32
                    type: integer
                required:
                - host
                - port
                type: object
            required:
            - controlPlaneEndpoint
            type: object
          status:
            description: status defines the observed state of LibvirtCluster.
            properties:
              conditions:
                description: conditions represent the current state of the LibvirtCluster
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              ready:
                description: ready indicates whether the cluster infrastructure is
                  ready.
                type: boolean
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
