# CAPLV cluster template — consumed by `clusterctl generate cluster`.
#
# Unlike most CAPI infrastructure providers, CAPLV does not ship a
# LibvirtMachineTemplate type. Each VM is configured explicitly with a
# hostRef and a static IP, and the webhook enforces one VM per host. This
# template therefore wires up an example control-plane Machine+LibvirtMachine
# pair as a worked example — duplicate the LibvirtHost / Machine /
# LibvirtMachine blocks (renaming .metadata.name and updating hostRef + IP +
# bootstrap data) for each additional node.
#
# Two resources this template intentionally does NOT generate, because they
# carry secret material the user must manage:
#
#   1. The Secret referenced by LibvirtHost.spec.secretRef — the SSH
#      private key CAPLV uses to reach the hypervisor.
#   2. The Secret referenced by Machine.spec.bootstrap.dataSecretName —
#      the ignition or cloud-init payload, typically produced by
#      capi-bootstrap-ignition or assembled by hand.
#
# Variables (set via clusterctl --config or env):
#   CLUSTER_NAME, NAMESPACE
#   CONTROL_PLANE_ENDPOINT_HOST   (CONTROL_PLANE_ENDPOINT_PORT defaults to 6443)
#   LIBVIRT_HOST_NAME             (the LibvirtHost CR name and its libvirt host)
#   LIBVIRT_HOST_URI              (e.g. qemu+ssh://caplv@host.example.com/system)
#   LIBVIRT_HOST_SSH_SECRET       (name of the Secret holding the SSH private key)
#   LIBVIRT_HOST_SSH_FINGERPRINT  (SHA256 host key fingerprint)
#   BOOTSTRAP_SECRET_NAME         (Secret with ignition/cloud-init payload)
#   BASE_IMAGE                    (qcow2 in the libvirt storage pool, e.g. rhcos.qcow2)
#   CONTROL_PLANE_IP              (CIDR, e.g. 192.168.1.10/24)
#   NETWORK_GATEWAY, NETWORK_DNS
#
# Optional (have defaults):
#   SERVICE_CIDR, POD_CIDR, SERVICE_DOMAIN
#   VCPUS, MEMORY_MB, ROOT_DISK_SIZE, STORAGE_POOL
#   NETWORK_TYPE, NETWORK_NAME, BOOTSTRAP_FORMAT
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: Cluster
metadata:
  name: ${CLUSTER_NAME}
  namespace: ${NAMESPACE}
spec:
  clusterNetwork:
    services:
      cidrBlocks: ${SERVICE_CIDR:=["10.96.0.0/12"]}
    pods:
      cidrBlocks: ${POD_CIDR:=["192.168.0.0/18"]}
    serviceDomain: ${SERVICE_DOMAIN:="cluster.local"}
  infrastructureRef:
    apiGroup: infrastructure.cluster.x-k8s.io
    kind: LibvirtCluster
    name: ${CLUSTER_NAME}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: LibvirtCluster
metadata:
  name: ${CLUSTER_NAME}
  namespace: ${NAMESPACE}
spec:
  controlPlaneEndpoint:
    host: ${CONTROL_PLANE_ENDPOINT_HOST}
    port: ${CONTROL_PLANE_ENDPOINT_PORT:=6443}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: LibvirtHost
metadata:
  name: ${LIBVIRT_HOST_NAME}
  namespace: ${NAMESPACE}
spec:
  uri: ${LIBVIRT_HOST_URI}
  secretRef:
    name: ${LIBVIRT_HOST_SSH_SECRET}
  hostKeyFingerprint: ${LIBVIRT_HOST_SSH_FINGERPRINT}
---
apiVersion: cluster.x-k8s.io/v1beta2
kind: Machine
metadata:
  name: ${CLUSTER_NAME}-cp-0
  namespace: ${NAMESPACE}
  labels:
    cluster.x-k8s.io/cluster-name: ${CLUSTER_NAME}
    cluster.x-k8s.io/control-plane: ""
spec:
  clusterName: ${CLUSTER_NAME}
  bootstrap:
    dataSecretName: ${BOOTSTRAP_SECRET_NAME}
  infrastructureRef:
    apiGroup: infrastructure.cluster.x-k8s.io
    kind: LibvirtMachine
    name: ${CLUSTER_NAME}-cp-0
---
apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1
kind: LibvirtMachine
metadata:
  name: ${CLUSTER_NAME}-cp-0
  namespace: ${NAMESPACE}
spec:
  hostRef:
    name: ${LIBVIRT_HOST_NAME}
  domain:
    vcpus: ${VCPUS:=4}
    memoryMB: ${MEMORY_MB:=8192}
  rootDisk:
    baseImage: ${BASE_IMAGE}
    storagePool: ${STORAGE_POOL:=default}
    size: ${ROOT_DISK_SIZE:=100Gi}
  network:
    type: ${NETWORK_TYPE:=bridge}
    name: ${NETWORK_NAME:=br0}
    addresses:
      - ${CONTROL_PLANE_IP}
    gateway: ${NETWORK_GATEWAY}
    dns:
      nameservers:
        - ${NETWORK_DNS}
  bootstrapFormat: ${BOOTSTRAP_FORMAT:=ignition}
