---
# CAPLV Host Setup Playbook
#
# Fully prepares a RHEL/Fedora host to be managed by CAPLV. Run with:
#
#   ansible-playbook -i <host>, -u root deploy/ansible/setup-host.yaml
#
# For RHEL 8, add to your inventory or command line:
#   -e ansible_python_interpreter=/usr/libexec/platform-python
#
# Optional variables (--extra-vars):
#   base_image_url    - URL to download a qcow2 base image
#   base_image_name   - filename in the storage pool (default: rhcos.qcow2)
#   caplv_user        - service account name (default: caplv)
#   storage_pool_path - libvirt default pool path (default: /var/lib/libvirt/images)
#   ssh_key_path      - where to write the generated key pair (default: /tmp/caplv-key)

- name: Set Python interpreter for RHEL 8
  hosts: all
  gather_facts: false
  tasks:
    - name: Detect platform-python
      ansible.builtin.raw: test -x /usr/libexec/platform-python && echo yes || echo no
      register: has_platform_python
      changed_when: false

    - name: Use platform-python on RHEL 8
      ansible.builtin.set_fact:
        ansible_python_interpreter: /usr/libexec/platform-python
      when: has_platform_python.stdout | trim == "yes"

- name: Prepare host for CAPLV
  hosts: all
  become: true

  vars:
    caplv_user: caplv
    storage_pool_path: /var/lib/libvirt/images
    base_image_name: rhcos.qcow2
    ssh_key_path: /tmp/caplv-key

  tasks:
    # ── Packages ──────────────────────────────────────────────

    - name: Install libvirt and UEFI firmware
      ansible.builtin.package:
        name:
          - libvirt
          - libvirt-daemon-kvm
          - qemu-kvm
          - edk2-ovmf
          - openssh-server
        state: present

    - name: Start and enable libvirtd
      ansible.builtin.systemd:
        name: libvirtd
        enabled: true
        state: started

    - name: Start and enable sshd
      ansible.builtin.systemd:
        name: sshd
        enabled: true
        state: started

    # ── SSH key pair ──────────────────────────────────────────

    - name: Check if SSH key pair already exists
      ansible.builtin.stat:
        path: "{{ ssh_key_path }}"
      register: ssh_key_stat
      delegate_to: localhost
      become: false

    - name: Generate SSH key pair
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -f {{ ssh_key_path }} -N "" -C "caplv-service-account"
      delegate_to: localhost
      become: false
      when: not ssh_key_stat.stat.exists

    - name: Read public key
      ansible.builtin.slurp:
        src: "{{ ssh_key_path }}.pub"
      register: ssh_pub_key
      delegate_to: localhost
      become: false

    # ── Service account ───────────────────────────────────────

    - name: Create caplv service account
      ansible.builtin.user:
        name: "{{ caplv_user }}"
        system: true
        shell: /sbin/nologin
        groups: libvirt
        append: true
        create_home: true

    - name: Create .ssh directory
      ansible.builtin.file:
        path: "/home/{{ caplv_user }}/.ssh"
        state: directory
        owner: "{{ caplv_user }}"
        group: "{{ caplv_user }}"
        mode: "0700"

    - name: Deploy SSH authorized key
      ansible.builtin.copy:
        content: "{{ ssh_pub_key.content | b64decode }}"
        dest: "/home/{{ caplv_user }}/.ssh/authorized_keys"
        owner: "{{ caplv_user }}"
        group: "{{ caplv_user }}"
        mode: "0600"

    # ── Sudoers ───────────────────────────────────────────────

    - name: Configure sudoers for caplv
      ansible.builtin.copy:
        content: |
          # CAPLV service account — restricted sudo for tmpfs and file operations.
          {{ caplv_user }} ALL=(root) NOPASSWD: /usr/bin/mkdir -p /run/caplv/*
          {{ caplv_user }} ALL=(root) NOPASSWD: /usr/bin/mount -t tmpfs tmpfs /run/caplv/*
          {{ caplv_user }} ALL=(root) NOPASSWD: /usr/bin/umount /run/caplv/*
          {{ caplv_user }} ALL=(root) NOPASSWD: /usr/bin/rmdir /run/caplv/*
          {{ caplv_user }} ALL=(root) NOPASSWD: /usr/bin/tee /run/caplv/*
          {{ caplv_user }} ALL=(root) NOPASSWD: /usr/bin/rm -f /run/caplv/*
        dest: "/etc/sudoers.d/{{ caplv_user }}"
        mode: "0440"
        validate: "visudo -cf %s"

    # ── Storage pool ──────────────────────────────────────────

    - name: Ensure default storage pool directory exists
      ansible.builtin.file:
        path: "{{ storage_pool_path }}"
        state: directory
        mode: "0711"

    - name: Check if default storage pool is defined
      ansible.builtin.command: virsh pool-info default
      register: pool_check
      changed_when: false
      failed_when: false

    - name: Define default storage pool
      ansible.builtin.command: >
        virsh pool-define-as default dir --target {{ storage_pool_path }}
      when: pool_check.rc != 0

    - name: Start default storage pool
      ansible.builtin.command: virsh pool-start default
      when: pool_check.rc != 0

    - name: Autostart default storage pool
      ansible.builtin.command: virsh pool-autostart default
      when: pool_check.rc != 0

    # ── Base image ────────────────────────────────────────────

    - name: Check if base image exists
      ansible.builtin.stat:
        path: "{{ storage_pool_path }}/{{ base_image_name }}"
      register: base_image_stat

    - name: Download base image
      ansible.builtin.get_url:
        url: "{{ base_image_url }}"
        dest: "{{ storage_pool_path }}/{{ base_image_name }}"
        mode: "0644"
      when:
        - base_image_url is defined
        - not base_image_stat.stat.exists

    - name: Refresh storage pool
      ansible.builtin.command: virsh pool-refresh default
      changed_when: false

    # ── Verification ──────────────────────────────────────────

    - name: Verify libvirtd is running
      ansible.builtin.command: virsh version
      changed_when: false

    - name: Test SSH connectivity as caplv user
      ansible.builtin.command: >
        ssh -i {{ ssh_key_path }}
        -o StrictHostKeyChecking=no
        -o UserKnownHostsFile=/dev/null
        {{ caplv_user }}@localhost
        virsh -c qemu:///system version
      delegate_to: localhost
      become: false
      changed_when: false
      register: ssh_test

    - name: Get SSH host key fingerprint
      ansible.builtin.command: ssh-keygen -lf /etc/ssh/ssh_host_ed25519_key.pub
      register: host_key
      changed_when: false

    - name: Extract fingerprint
      ansible.builtin.set_fact:
        ssh_fingerprint: "{{ host_key.stdout.split(' ')[1] }}"

    - name: List base images in pool
      ansible.builtin.command: virsh vol-list default
      register: vol_list
      changed_when: false

    - name: Display setup summary
      ansible.builtin.debug:
        msg:
          - ""
          - "═══════════════════════════════════════════════════════════"
          - "  CAPLV host setup complete"
          - "═══════════════════════════════════════════════════════════"
          - ""
          - "  SSH private key:  {{ ssh_key_path }}"
          - "  SSH fingerprint:  {{ ssh_fingerprint }}"
          - "  Host IP:          {{ ansible_default_ipv4.address }}"
          - ""
          - "  Storage pool volumes:"
          - "{{ vol_list.stdout }}"
          - ""
          - "  ── Create the K8s Secret ──"
          - ""
          - "  kubectl create secret generic laptop-ssh-key \\"
          - "    --from-file=ssh-privatekey={{ ssh_key_path }}"
          - ""
          - "  ── Apply this LibvirtHost ──"
          - ""
          - "  apiVersion: infrastructure.cluster.x-k8s.io/v1alpha1"
          - "  kind: LibvirtHost"
          - "  metadata:"
          - "    name: laptop"
          - "  spec:"
          - "    uri: \"qemu+ssh://{{ caplv_user }}@{{ ansible_default_ipv4.address }}/system\""
          - "    secretRef:"
          - "      name: laptop-ssh-key"
          - "    hostKeyFingerprint: \"{{ ssh_fingerprint }}\""
          - ""
          - "═══════════════════════════════════════════════════════════"
